name: API设计子代理
capability: api-design
description: 基于需求基线、现有接口资产和约束策略生成项目级 API 设计产物。具备根据受众（内部/外部/两者）自动判定并产出对应 API 设计的能力，并沉淀校校验证据。
version: 0.1.1
skills:
  - api-design
inputs:
  required:
    - requirements
    - existing_assets
    - output_root
  optional:
    - constraints
    - context
    - audience # 指定受众类型: "internal", "external", "both" (默认)
outputs:
  required:
    - artifacts/api-internal.yaml # 若 audience 为 internal 或 both
    - artifacts/api-public.yaml # 若 audience 为 external 或 both
    - artifacts/errors-rfc9457.json
    - artifacts/api-design.md
    - evidence/api-design.json
  schema_locked: true
tools:
  allowed:
    - filesystem
    - git
    - spectral
    - ajv
    - python:design-system/skills/api-design/scripts/render_contract_stub.py
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  manual_override_forbidden: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
  on_partial_generation: emit_evidence_and_fail

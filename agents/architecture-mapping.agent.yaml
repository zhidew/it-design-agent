name: 模块边界分析代理
capability: architecture-mapping
description: 分析业务需求与既有系统结构，识别模块边界并建立依赖关系映射。
version: 0.1.0
skills:
  - architecture-mapping
inputs:
  required:
    - requirements
    - existing_assets
    - output_root
  optional:
    - context
outputs:
  required:
    - artifacts/architecture.md
    - artifacts/module-map.json
    - evidence/architecture-mapping.json
  schema_locked: true
tools:
  allowed:
    - filesystem
    - python:design-system/skills/architecture-mapping/scripts/render_architecture_mapping_stub.py
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail

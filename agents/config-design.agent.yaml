name: 配置设计子代理
capability: config-design
description: 规划多环境配置、开关策略和密钥规范。
version: 0.1.0
skills:
  - config-design
inputs:
  required:
    - requirements
    - existing_assets
    - output_root
  optional:
    - context
outputs:
  required:
    - artifacts/config-catalog.yaml
    - artifacts/config-matrix.md
    - evidence/config-design.json
  schema_locked: true
tools:
  allowed:
    - filesystem
    - python:design-system/skills/config-design/scripts/render_config_design_stub.py
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail

name: 设计产物汇编子代理
capability: design-assembler
description: 汇编所有结构化设计产物，生成最终的详细设计文档及需求追踪矩阵。
version: 0.1.0
skills:
  - design-assembler
inputs:
  required:
    - requirements
    - existing_assets
    - output_root
  optional:
    - context
outputs:
  required:
    - release/detailed-design.md
    - release/traceability.json
    - release/review-checklist.md
    - evidence/design-assembler.json
  schema_locked: true
tools:
  allowed:
    - filesystem
    - python:design-system/skills/design-assembler/scripts/render_design_assembler_stub.py
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail

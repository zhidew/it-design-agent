name: 测试可设计性子代理
capability: test-design
description: 提取测试输入条件，生成覆盖率映射矩阵。
version: 0.1.0
skills:
  - test-design
inputs:
  required:
    - requirements
    - existing_assets
    - output_root
  optional:
    - context
outputs:
  required:
    - artifacts/test-inputs.md
    - artifacts/coverage-map.json
    - evidence/test-design.json

name: IT Design Quality Gate

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'projects/**'

jobs:
  validate-design-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Validation Tools
        run: |
          npm install -g @stoplight/spectral-cli @asyncapi/cli ajv-cli @mermaid-js/mermaid-cli
          pip install sqlfluff

      - name: Run Validation Engine
        # 假设针对某个项目路径运行，实际使用时可作为矩阵运行或通过脚本遍历
        run: |
          python design-system/scripts/validate_artifacts.py --project examples/golden-project

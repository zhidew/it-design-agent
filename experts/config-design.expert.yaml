name: Configuration Design Expert
capability: config-design
description: Plan multi-environment configurations, feature flags, and secret management policies.
version: 0.1.1
skills:
  - config-design
scheduling:
  priority: 65
  dependencies:
    - architecture-mapping
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
tools:
  allowed: [clone_repository, query_database, query_knowledge_base, write_file, patch_file]
outputs:
  expected: [config-spec.yaml]

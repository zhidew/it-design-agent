name: DDD Structure Expert
capability: ddd-structure
description: Perform domain modeling and structural design, producing class diagrams, DDD structure descriptions, and context mappings.
version: 0.1.1
skills:
  - ddd-structure
scheduling:
  priority: 75
  dependencies:
    - data-design
upstream_artifacts:
  data-design:
    - schema.sql
    - er.md
    - migration-plan.md
tools:
  allowed:
    - clone_repository
    - query_database
    - query_knowledge_base
    - write_file
    - patch_file
outputs:
  expected:
    - class-diagram.md
    - ddd-structure.md
    - context-map.md
metadata:
  boundary_contract:
    owns:
      - aggregates, bounded contexts, invariants, and context mapping
    excludes:
      - full DDL and migration detail
      - detailed API or async payload design
      - ops and test design
    upstream_inputs:
      - data-design
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail

name: Flow Design Expert
capability: flow-design
description: Generate system interaction sequence diagrams and state machines based on business requirements, covering main flows and exception handling paths.
version: 0.1.1
skills:
  - flow-design
scheduling:
  priority: 60
  dependencies:
    - architecture-mapping
upstream_artifacts:
  architecture-mapping:
    - architecture.md
    - module-map.json
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
tools:
  allowed: [clone_repository, query_database, query_knowledge_base, write_file, patch_file]
outputs:
  expected: [sequence.md, state.md]
metadata:
  boundary_contract:
    owns:
      - sequence flow and state lifecycle views
    excludes:
      - detailed API or async schema definitions
      - DDL and config design
      - ops and test design
    upstream_inputs:
      - architecture-mapping

name: Integration Design Expert
capability: integration-design
description: Design cross-service and external system integration protocols, including async event contracts (AsyncAPI) and compensation strategies.
version: 0.1.1
skills:
  - integration-design
scheduling:
  priority: 85
  dependencies:
    - architecture-mapping
upstream_artifacts:
  architecture-mapping:
    - architecture.md
    - module-map.json
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
tools:
  allowed: [clone_repository, query_database, query_knowledge_base, write_file, patch_file]
outputs:
  expected: [integration.md, asyncapi.yaml]
metadata:
  boundary_contract:
    owns:
      - cross-service and external integration contracts
      - async events, retries, idempotency, and compensation
    excludes:
      - full REST schema catalog
      - detailed DDL or index design
      - config matrix, ops, and test design
    upstream_inputs:
      - architecture-mapping

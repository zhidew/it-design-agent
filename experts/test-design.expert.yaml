name: Test Design Expert
capability: test-design
description: Extract test input conditions and generate coverage mapping matrices.
version: 0.1.1
skills:
  - test-design
scheduling:
  priority: 50
  dependencies:
    - flow-design
    - api-design
    - integration-design
    - ops-design
upstream_artifacts:
  flow-design:
    - sequence.md
    - state.md
  api-design:
    - api-design.md
    - errors-rfc9457.json
  integration-design:
    - integration.md
    - asyncapi.yaml
  ops-design:
    - slo.yaml
    - observability-spec.yaml
    - deployment-runbook.md
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: fail
tools:
  allowed: [clone_repository, query_database, query_knowledge_base, write_file, patch_file]
outputs:
  expected: [test-inputs.md, coverage-map.json]
metadata:
  boundary_contract:
    owns:
      - test inputs, coverage mapping, and verification scenarios
    excludes:
      - redesign of architecture, domain, API, integration, data, config, or ops artifacts
    upstream_inputs:
      - flow-design
      - api-design
      - integration-design
      - ops-design

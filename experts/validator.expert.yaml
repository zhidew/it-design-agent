name: Validation Expert
capability: validator
description: Validate the completeness and consistency of all design artifacts and generate validation reports.
version: 0.1.1
skills:
  - validator
scheduling:
  priority: 10
  dependencies:
    - design-assembler
policies:
  asset_baseline_required: true
  evidence_required: true
  output_must_be_structured: true
  descriptions_prefer_chinese: true
error_handling:
  on_missing_required_input: fail
  on_validation_failure: warn
tools:
  allowed:
    - run_command
outputs:
  expected:
    - validation-report.md
